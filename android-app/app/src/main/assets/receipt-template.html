<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Gen Alpha Receipt Template</title>
    <style>
      :root {
        --primary: #0d2d66;
        --accent: #1f5fbf;
        --gold: #f4be2e;
        --ink: #10264f;
        --muted: #66748c;
        --line: #d8e1ee;
        --paper: #ffffff;
        --soft: #f8fbff;
        --success: #178553;
      }

      body {
        margin: 0;
        padding: 28px;
        background: #f3f6fb;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--ink);
      }

      .receipt {
        width: 610px;
        min-height: 970px;
        border-radius: 8px;
        overflow: hidden;
        background: var(--paper);
        border: 2px solid var(--line);
      }

      .top-stripe {
        height: 12px;
        background: var(--primary);
        border-bottom: 4px solid var(--gold);
      }

      .content {
        padding: 30px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .header img {
        width: 72px;
        height: 96px;
        object-fit: contain;
      }

      .paid {
        margin-left: auto;
        align-self: flex-start;
        border-radius: 999px;
        padding: 9px 18px;
        background: var(--success);
        color: white;
        font-weight: 800;
      }

      .rule {
        height: 2px;
        margin: 38px 0;
        background: var(--line);
      }

      .player {
        margin-top: 38px;
        padding: 24px;
        border: 1px solid #e2e9f5;
        border-radius: 6px;
        background: var(--soft);
      }
    </style>
  </head>
  <body>
    <article class="receipt">
      <div class="top-stripe"></div>
      <main class="content">
        <header class="header">
          <img src="../res/drawable/gen_alpha_badge_transparent.png" alt="Gen Alpha badge" />
          <div>
            <p>GEN ALPHA CRICKET ACADEMY</p>
            <h1>Fee Receipt</h1>
            <p>Official payment confirmation</p>
          </div>
          <span class="paid">PAID</span>
        </header>
      </main>
    </article>
  </body>
</html>
