<!--
  Gen Alpha Cricket Academy receipt template reference.
  The native Android PDF generator in AcademyApp.kt mirrors this layout using PdfDocument.
  Keep this file as the visual source when changing receipt style.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Gen Alpha Receipt Template</title>
    <style>
      :root {
        --navy: #071a3e;
        --blue: #1f5fbf;
        --gold: #f4be2e;
        --ink: #10264f;
        --muted: #66748c;
        --paper: #ffffff;
        --soft-blue: #f2f7ff;
        --soft-gold: #fff6d8;
        --success: #178553;
      }

      body {
        margin: 0;
        padding: 28px;
        background: #eaf1fb;
        font-family: "Aptos", "Segoe UI", sans-serif;
        color: var(--ink);
      }

      .receipt {
        max-width: 680px;
        border-radius: 34px;
        padding: 22px;
        background: var(--paper);
        border: 1px solid #d9e3f2;
        box-shadow: 0 30px 80px rgba(7, 26, 62, 0.16);
      }

      .hero {
        position: relative;
        overflow: hidden;
        min-height: 230px;
        border-radius: 28px;
        padding: 28px;
        background: var(--navy);
        color: white;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0 0 auto;
        height: 11px;
        background: linear-gradient(90deg, var(--gold), #ffe996, var(--blue));
      }

      .status {
        position: absolute;
        top: 28px;
        right: 28px;
        padding: 9px 18px;
        border-radius: 999px;
        background: var(--success);
        font-weight: 950;
      }

      .summary,
      .details {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .summary {
        margin: -34px 20px 0;
        position: relative;
      }

      .card {
        border: 1px solid #e1e9f5;
        border-radius: 22px;
        padding: 16px;
        background: white;
      }

      .amount {
        background: var(--soft-gold);
      }

      .player {
        margin: 18px 20px 0;
        background: var(--soft-blue);
      }

      .details {
        margin: 18px 20px 0;
      }
    </style>
  </head>
  <body>
    <article class="receipt">
      <section class="hero">
        <p>GEN ALPHA CRICKET ACADEMY</p>
        <h1>{{receiptType}}</h1>
        <span class="status">PAID</span>
      </section>
      <section class="summary">
        <div class="card">{{receiptNo}}</div>
        <div class="card amount">{{amountPaid}}</div>
      </section>
      <section class="card player">{{playerName}} • {{regNo}}</section>
      <section class="details">{{detailCards}}</section>
    </article>
  </body>
</html>
